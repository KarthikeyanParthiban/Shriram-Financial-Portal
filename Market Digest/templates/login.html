<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Login — Shriram Financial Tools Portal</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --border: #E8E8ED;
  --text: #1D1D1F;
  --text-muted: #86868B;
  --accent: #F7B500; /* Shriram Yellow */
  --accent-hover: #E0A400;
  --red: #FF3B30;
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  --transition: 0.15s cubic-bezier(0.25, 1, 0.5, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 380px;
  padding: 40px 32px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.03);
}

.header {
  text-align: center;
  margin-bottom: 32px;
}

.logo-img {
  height: 48px;
  width: auto;
  margin-bottom: 16px;
  object-fit: contain;
}

.title {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 13px;
  color: var(--text-muted);
}

.field {
  margin-bottom: 20px;
}

.label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.input {
  width: 100%;
  padding: 12px;
  font-family: var(--font-sans);
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  outline: none;
  transition: border-color var(--transition);
}

.input:focus {
  border-color: var(--accent);
}

.btn-login {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: #000000;
  border: none;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
  margin-top: 10px;
}

.btn-login:hover {
  background: var(--accent-hover);
}

.btn-login:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.error-message {
  color: var(--red);
  font-size: 12px;
  margin-top: 16px;
  text-align: center;
  min-height: 18px;
}
</style>
</head>
<body>

<div class="login-card">
  <div class="header">
    <img src="/logo.jpeg" alt="Shriram Logo" class="logo-img">
    <h2 class="title">Sign In</h2>
    <p class="subtitle">Enter your details to access tools</p>
  </div>

  <form id="login-form" method="POST" action="/login">
    <div class="field">
      <label class="label" for="mobile">Mobile Number</label>
      <input class="input" id="mobile" name="mobile" type="tel" placeholder="10-digit number" required autocomplete="username" maxlength="10">
    </div>
    
    <div class="field">
      <label class="label" for="password">Password</label>
      <input class="input" id="password" name="password" type="password" placeholder="Password" required autocomplete="current-password">
    </div>

    <button type="submit" class="btn-login" id="btn-submit">Sign In</button>
  </form>

  <div class="error-message" id="error-box">
    {% if error %}
      {{ error }}
    {% endif %}
  </div>
</div>

<script>
const mobileInput = document.getElementById('mobile');
const errorBox = document.getElementById('error-box');

// Restrict mobile input to numeric digits only
mobileInput.addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^0-9]/g, '');
  if (errorBox.textContent.trim()) {
    errorBox.textContent = '';
  }
});

document.getElementById('login-form').addEventListener('submit', (e) => {
  if (mobileInput.value.length !== 10) {
    e.preventDefault();
    errorBox.textContent = 'Please enter a valid 10-digit mobile number.';
  }
});
</script>
</body>
</html>
