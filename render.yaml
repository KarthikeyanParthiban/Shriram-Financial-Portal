# Render Blueprint. Free tier: no persistent disk, so account/config data lives in
# a managed PostgreSQL database (db_helper auto-uses Postgres when DATABASE_URL is set).
# NOTE: Render's FREE PostgreSQL is deleted ~30 days after creation unless upgraded.
databases:
  - name: shriram-portal-db
    plan: free

services:
  - type: web
    name: shriram-financial-portal
    runtime: docker
    dockerfilePath: Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: PORT
        value: 8000
      - key: MARKET_DIGEST_CHROME
        value: /usr/bin/google-chrome
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shriram-portal-db
          property: connectionString
